<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nossa Gestão</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MinhaVidaDashboard.styles.css" rel="stylesheet" />

    <style>
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 9999;
            font-family: 'Roboto', sans-serif;
            transition: opacity 0.4s ease;
        }

            #loading-screen.fadeout {
                opacity: 0;
                pointer-events: none;
            }

        .loading-logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #5C6BC0;
            margin-bottom: 32px;
        }

            .loading-logo span {
                color: #E91E63;
            }

        .loading-bar-track {
            width: 200px;
            height: 4px;
            background: #e8eaf6;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #5C6BC0, #E91E63);
            border-radius: 4px;
        }

        .loading-status {
            font-size: 0.75rem;
            color: #9e9e9e;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="loading-screen">
            <div class="loading-logo">US<span>_</span>DASH</div>
            <div class="loading-bar-track">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-status" id="loading-status-text">Inicializando...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">X</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script>
        const statusMessages = ["Inicializando...", "Carregando módulos...", "Preparando dashboard...", "Quase lá..."];
        let msgIndex = 0;
        const statusEl = document.getElementById('loading-status-text');
        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % statusMessages.length;
            if (statusEl) statusEl.textContent = statusMessages[msgIndex];
        }, 900);

        function removerLoadingScreen() {
            clearInterval(msgInterval);
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.classList.add('fadeout');
                setTimeout(() => { if (screen.parentNode) screen.parentNode.removeChild(screen); }, 450);
            }
        }

        // Remove quando o Blazor adicionar conteúdo ao #app
        const observer = new MutationObserver(() => {
            const app = document.getElementById('app');
            // Blazor adiciona um comentário + o componente raiz
            if (app && app.childNodes.length > 1) {
                removerLoadingScreen();
                observer.disconnect();
            }
        });

        const appEl = document.getElementById('app');
        if (appEl) {
            observer.observe(appEl, { childList: true });
        }

        // Fallback: remove após 8 segundos de qualquer forma
        setTimeout(removerLoadingScreen, 8000);
    </script>
</body>

</html>

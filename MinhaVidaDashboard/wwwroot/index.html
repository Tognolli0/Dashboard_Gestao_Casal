<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Always Together</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MinhaVidaDashboard.styles.css" rel="stylesheet" />

    <style>
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 9999;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.5s ease;
        }

            #loading-screen.fadeout {
                opacity: 0;
                pointer-events: none;
            }

        .loading-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            display: block;
        }

        .loading-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .loading-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .loading-bar-track {
            width: 160px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #5C6BC0, #E91E63);
            border-radius: 2px;
            animation: loading-anim 2s infinite ease-in-out;
        }

        @keyframes loading-anim {
            0% {
                width: 10%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }

        .loading-status {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="loading-screen">
            <img class="loading-photo" src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/..." alt="Diogo e Beatriz" />
            <div class="loading-title">Always Together</div>
            <div class="loading-subtitle">Diogo &amp; Beatriz</div>
            <div class="loading-bar-track">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-status" id="loading-status-text">Carregando...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">X</span>
    </div>

    <script src="blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script>
        function removerLoadingScreen() {
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.classList.add('fadeout');
                setTimeout(() => { if (screen.parentNode) screen.parentNode.removeChild(screen); }, 500);
            }
        }

        // Monitora quando o Blazor renderiza
        const appElement = document.getElementById('app');
        const observer = new MutationObserver(() => {
            if (appElement && appElement.children.length > 1) {
                removerLoadingScreen();
                observer.disconnect();
            }
        });

        if (appElement) observer.observe(appElement, { childList: true });

        // Fallback: 20 segundos
        setTimeout(removerLoadingScreen, 20000);
    </script>
</body>
</html>

[build]
  # 1. Define a pasta onde está o projeto Blazor (o frontend)
  base = "MinhaVidaDashboard"
  
  # 2. Comando para instalar o SDK 10 e publicar
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet publish -c Release -o publish"
  
  # 3. Define onde o Netlify vai buscar os arquivos finais. 
  # Importante: Como definimos 'base' acima, este caminho é relativo à pasta MinhaVidaDashboard
  publish = "publish/wwwroot"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
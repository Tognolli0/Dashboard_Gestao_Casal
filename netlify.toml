[build]
  # Entra na pasta do Dashboard para compilar
  base = "MinhaVidaDashboard"
  
  # Comando de Build: publica especificamente o projeto do Dashboard
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet publish MinhaVidaDashboard.csproj -c Release -o publish"
  
  # Como o 'base' é MinhaVidaDashboard, o Netlify busca os arquivos aqui:
  publish = "publish/wwwroot"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false	
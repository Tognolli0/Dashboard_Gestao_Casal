[build]
  # 1. Verifique se o seu .csproj está dentro de MinhaVidaDashboard/
  base = "MinhaVidaDashboard"
  
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet publish MinhaVidaDashboard.csproj -c Release -o publish"
  
  # 2. O Netlify deve servir o que foi publicado
  publish = "publish/wwwroot"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
# netlify.toml (update the build.command)
[build]
  base = "MinhaVidaDashboard"
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet workload install wasm-tools && ./.dotnet/dotnet publish MinhaVidaDashboard.csproj -c Release -o publish"
  publish = "MinhaVidaDashboard/publish/wwwroot"
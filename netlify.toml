[build]
  # Entra na pasta do projeto Dashboard
  base = "MinhaVidaDashboard"
  
  # Comando de build simplificado
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet publish MinhaVidaDashboard.csproj -c Release -o dist"
  
  # AQUI ESTÁ O PULO DO GATO:
  # Garantimos que ele procure o index.html na raiz da pasta dist/wwwroot
  publish = "dist/wwwroot"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
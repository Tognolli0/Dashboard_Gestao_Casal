[build]
  # Entra na pasta onde está o código da API/Dashboard
  base = "MinhaVidaAPI"
  
  # Instala o SDK 10 e publica o projeto
  command = "curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0 --install-dir .dotnet && ./.dotnet/dotnet publish -c Release -o publish"
  
  # Define a pasta de saída correta para o Netlify servir os arquivos
  publish = "publish/wwwroot"

[[redirects]]
  # Resolve o erro de SyntaxError: Unexpected token '<' ao recarregar
  from = "/*"
  to = "/index.html"
  status = 200
  force = false